name: Build & Deploy vue-dsfr-app

on:
  push:
    branches:
      - main
      - vue-dsfr-app

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Job 1 : Lint & Tests ────────────────────────────────────────────────────
  lint-test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter vue-dsfr-app lint

      - name: Tests unitaires
        run: pnpm --filter vue-dsfr-app test:unit --run

  # ─── Job 2 : Build & Push image Docker ───────────────────────────────────────
  build-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/vue-dsfr-app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── Job 3 : Scan de sécurité Trivy ──────────────────────────────────────────
  trivy-scan:
    name: Scan Trivy
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image avec Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.build-push.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload résultats Trivy vers GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ─── Job 4 : Déploiement Helm ─────────────────────────────────────────────────
  deploy:
    name: Deploy Helm
    runs-on: ubuntu-latest
    needs: trivy-scan
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        # TODO: ajouter le secret KUBE_CONFIG dans les secrets GitHub
        # (kubeconfig encodé en base64 avec droits helm upgrade sur le namespace cible)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy via Helm
        run: |
          helm upgrade --install vue-dsfr-app ./helm/vue-dsfr-app \
            --namespace YOUR_NAMESPACE \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=$(echo "${{ github.sha }}" | cut -c1-7) \
            --wait \
            --timeout 5m
