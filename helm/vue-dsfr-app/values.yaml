replicaCount: 1

image:
  repository: ghcr.io/YOUR_ORG/YOUR_REPO
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  # TODO: remplacer par le domaine de votre environnement
  host: your-app.example.com
  annotations: {}
  tls: []
  # Exemple TLS :
  # tls:
  #   - secretName: vue-dsfr-app-tls
  #     hosts:
  #       - your-app.example.com

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
